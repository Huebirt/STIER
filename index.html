<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tier List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
</head>

<body>
    <header>
        <div class="header-content">
            <span class="header-title">Tier List</span>
            <div class="search-wrapper">
                <form>
                    <div class="search">
                        <span class="search-icon material-symbols-outlined">search</span>
                        <input class="search-input" type="search" placeholder="Search">
                    </div>
                </form>
                <div class="search-dropdown" id="search-dropdown"></div>
            </div>
            <div class="off-screen-menu">
                <ul>
                    <li>Home</li>
                    <li>Settings</li>
                    <li>Login</li>
                </ul>
            </div>
            <nav>
                <div class="ham-menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </nav>
        </div>
    </header>

    <p>Hello I'm Hugh McCredie.
        My goal was to design a tier list maker
        that is visually pleasing and easy to use.
        Hope you enjoy!
    </p>

    <div class="tierlist">
        <div class="tier-row">
            <div class="tier-label s">S</div>
            <div class="tier-zone" data-tier="S"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label a">A</div>
            <div class="tier-zone" data-tier="A"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label b">B</div>
            <div class="tier-zone" data-tier="B"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label c">C</div>
            <div class="tier-zone" data-tier="C"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label d">D</div>
            <div class="tier-zone" data-tier="D"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label f">F</div>
            <div class="tier-zone" data-tier="F"></div>
        </div>
    </div>
    <div class="game-pool" id="game-pool"></div>

    <script src="script.js"></script>
</body>
</html>
