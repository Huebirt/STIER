<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STier</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search,share" />

</head>

<body>
    <header>
        <div class="header-content">
            <a href="index.html"><img class="header-logo" src="images/STierBW.png" alt="STier home"></a>
            <div class="search-wrapper">
                <form>
                    <div class="search">
                        <span class="search-icon material-symbols-outlined">search</span>
                        <input class="search-input" type="search" placeholder="Search">
                    </div>
                </form>
                <div class="search-dropdown" id="search-dropdown"></div>
            </div>
            <div class="off-screen-menu">
                <ul>
                    <li class="user-display" style="display:none; font-size:0.9rem; color:#6f89ff;"></li>
                    <li><a href="tiermaker.html">Tier Maker</a></li>
                    <li>Settings</li>
                    <li class="login-btn">Login</li>
                </ul>
            </div>
            <nav>
                <div class="ham-menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </nav>
        </div>
    </header>

    <div class="menu-bar">
        <div class="menu-item">
            <button class="menu-trigger">File</button>
            <div class="menu-dropdown">
                <button id="save-btn">Save</button>
                <button id="save-as-btn">Save As</button>
                <button id="download-btn">Download as PNG</button>
                <hr>
                <button id="my-projects-btn">My Projects</button>
            </div>
        </div>
        <div class="menu-item">
            <button class="menu-trigger">Edit</button>
            <div class="menu-dropdown">
                <button id="undo-btn" disabled>Undo <span class="menu-shortcut">⌘Z</span></button>
                <button id="redo-btn" disabled>Redo <span class="menu-shortcut">⌘⇧Z</span></button>
                <hr>
                <button id="add-row-btn">+ Add Row</button>
                <button id="reset-pool-btn">Reset All to Pool</button>
            </div>
        </div>
        <div class="menu-item">
            <button class="menu-trigger">Share</button>
            <div class="menu-dropdown">
                <button id="publish-btn">Publish</button>
            </div>
        </div>
    </div>

    <div id="save-progress" class="save-progress" style="display:none">
        <div class="save-progress-bar"></div>
        <span class="save-progress-text">Saving...</span>
    </div>

    <div class="tierlist-wrapper">
        <div id="tierlist" class="tierlist">
            <div class="tier-row">
                <div class="tier-label s" contenteditable="true">S</div>
                <div class="tier-zone" data-tier="S"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label a" contenteditable="true">A</div>
                <div class="tier-zone" data-tier="A"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label b" contenteditable="true">B</div>
                <div class="tier-zone" data-tier="B"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label c" contenteditable="true">C</div>
                <div class="tier-zone" data-tier="C"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label d" contenteditable="true">D</div>
                <div class="tier-zone" data-tier="D"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label f" contenteditable="true">F</div>
                <div class="tier-zone" data-tier="F"></div>
            </div>
        </div>
        <button id="share-btn" class="share-btn" title="Share">
            <span class="material-symbols-outlined">share</span>
        </button>
    </div>

    <div class="upload-section">
        <input type="file" id="image-upload" accept="image/*" multiple>
        <label for="image-upload">Upload Images</label>
        <input type="file" id="folder-upload" accept="image/*" webkitdirectory>
        <label for="folder-upload">Upload Folder</label>
    </div>

    <div class="game-pool" id="game-pool"></div>

    <script src="script.js"></script>
    <script type="module" src="firebase-config.js"></script>
</body>
</html>
